services:
  db:
    image: postgres:15
    container_name: currency_db
    restart: always
    environment:
      # These MUST match what you put in your .env file
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: valet_app
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
